[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = [
    "_isaac_sim",
    "logs",
    "Isaacsim_tactile_env/output",
]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "C90", "SIM", "RET"]
ignore = [
    "E402",
    "RET504",
    "RET505",
    "SIM102",
    "SIM103",
    "SIM108",
    "SIM117",
    "SIM118",
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.ruff.lint.mccabe]
max-complexity = 30

[tool.ruff.lint.isort.sections]
"omniverse-extensions" = ["isaacsim", "omni", "pxr", "carb", "usdrt"]
"isaaclab" = ["isaaclab"]

[tool.ruff.lint.isort]
section-order = [
    "future",
    "standard-library",
    "third-party",
    "omniverse-extensions",
    "isaaclab",
    "first-party",
    "local-folder",
]

[tool.pyright]
include = ["Isaacsim_tactile_env", "scripts/demo"]
exclude = [
    "**/__pycache__",
    "**/_isaac_sim",
    "**/output",
    ".git",
    ".vscode",
]
typeCheckingMode = "basic"
pythonVersion = "3.11"
pythonPlatform = "Linux"
reportMissingImports = "none"
reportMissingModuleSource = "none"

[tool.codespell]
skip = "*.usd,*.usda,*.usdz,*.svg,*.png,_isaac_sim*,Isaacsim_tactile_env/output"
quiet-level = 0
